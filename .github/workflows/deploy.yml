name: Deploy OrbitX Admin Frontend

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  deploy:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'development'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/orbitx-admin:latest
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Copy project files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SERVER_USER }}/orbitx-admin"

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR=/home/${{ secrets.SERVER_USER }}/orbitx-admin

            echo "Creating deployment directory..."
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            echo "Logging into GitHub Container Registry..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest image..."
            docker pull ghcr.io/${{ github.repository_owner }}/orbitx-admin:latest

            echo "Stopping existing container..."
            docker compose down || true

            echo "Starting service with docker compose..."
            docker compose up -d

            echo "Waiting for service to be ready..."
            sleep 5

            echo "Checking service status..."
            docker compose ps

            echo "Checking health..."
            curl -f http://localhost:4100/health || echo "Health check failed"

            echo "Checking logs..."
            docker compose logs admin-frontend --tail 10
